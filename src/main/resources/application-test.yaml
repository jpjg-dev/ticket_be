spring:
  config:
    import: optional:file:.env.test[.properties]

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: warn
    com.jipi.ticket_ledger: info
    org.springframework: warn
    org.hibernate: warn
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz123456}

toss:
  payments:
    base-url: http://127.0.0.1:18080
    secret-key: ${TOSS_SECRET_KEY:test_secret_key}

reservation:
  hold-duration: 30s
  expire-scheduler:
    fixed-delay-ms: 60000

security:
  csrf-origin:
    allowed-origins:
      - http://localhost:3000
      - https://localhost:3000
      - https://ticketledger.dev

cache:
  event:
    list:
      ttl: 60s
      max-size: 1
    detail:
      ttl: 5m
      max-size: 100
