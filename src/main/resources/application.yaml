spring:
  output:
    ansi:
      enabled: always

  application:
    name: ticket-ledger

  lifecycle:
    timeout-per-shutdown-phase: 10s

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: ${PORT:8080}
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 300000  # 5 minutes
  refresh-token-expiration: 86400000 # 24 hours

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

toss:
  payments:
    base-url: https://api.tosspayments.com
    secret-key: ${TOSS_SECRET_KEY}
    connect-timeout: 2s
    read-timeout: 5s

app:
  time:
    # 공연 일정(LocalDateTime)을 "현재 몇 시인가"로 해석할 때 쓰는 서비스 로컬 타임존.
    # 컨테이너 타임존에 의존하지 않도록 코드에서 명시적으로 사용한다.
    # 향후 해외 공연장을 지원하면 이 단일 존 대신 venue별 타임존으로 확장한다.
    service-zone: Asia/Seoul

logging:
  pattern:
    # 모든 로그 줄에 [traceId|userId|clientIp] 를 찍어 요청 단위로 장애를 추적한다(값 없으면 빈칸).
    level: "%5p [%X{traceId:-}|%X{userId:-}|%X{clientIp:-}]"
