name: Backend Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ticket-be-docker-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jpjg-dev/ticket-be
  JAVA_VERSION: '21'

jobs:
  publish:
    name: Test, Publish, and Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build with Gradle
        env:
          PORT: "8080"
          JWT_SECRET: ci-test-jwt-secret-abcdefghijklmnopqrstuvwxyz-123456
          TOSS_SECRET_KEY: ci-test-toss-secret
          CACHE_REDIS_HOST: localhost
          CACHE_REDIS_PORT: "6379"
          CACHE_REDIS_CONNECT_TIMEOUT: 1s
          CACHE_REDIS_TIMEOUT: 2s
          SEAT_LOCK_WAIT_TIME: 0ms
          SEAT_LOCK_WATCHDOG_TIMEOUT: 30s
          SEAT_LOCK_FALLBACK_MAX_CONCURRENT: "2"
          SEAT_LOCK_FALLBACK_WAIT_TIME: 100ms
          SEAT_LOCK_RETRY_AFTER_SECONDS: "1"
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy backend on GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          port: ${{ secrets.GCP_SSH_PORT }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          script: |
            cd "${{ secrets.GCP_PATH }}"

            git pull --ff-only origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose --env-file .env config -q
            
            docker compose --env-file .env up -d --pull always backend
            
            if docker compose --env-file .env ps --status running --services | grep -qx backend; then
              echo "backend is running"
            else
              docker compose --env-file .env logs --tail=100 backend
              exit 1
            fi
