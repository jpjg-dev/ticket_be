spring:
  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

#예약 만료기간 설정 및 만료 스케쥴러
reservation:
  hold-duration: 5m # 5 minutes 뒤 만료
  expire-scheduler:
    fixed-delay-ms: 60000 # 1 minute 마다 만료된 예약 확인 후 정리
    batch-size: 100

#결제 복구 스케쥴러
payment:
  recovery-scheduler:
    grace-ms: 60000 # 60 seconds
    fixed-delay-ms: 60000 # 1 minute
    batch-size: 20

toss:
  payments:
    connect-timeout: 2s
    read-timeout: 5s

logging:
  pattern:
    # 모든 로그 줄에 [traceId][userId][clientIp] 를 찍어 요청 단위로 장애를 추적한다(값 없으면 빈칸).
    level: "%5p [trace=%X{traceId:-}][user=%X{userId:-}][ip=%X{clientIp:-}]"
  level:
    root: info
    com.jipi.ticket_ledger: info
    org.springframework: warn
    org.hibernate: warn
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off

security:
  csrf-origin:
    allowed-origins:
      - https://ticketledger.dev
      - https://www.ticketledger.dev

cache:
  event:
    list:
      ttl: 60s
    detail:
      ttl: 5m
