name: Backend Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ticket-be-docker-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jpjg-dev/ticket-be

jobs:
  docker-publish:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy backend on GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          port: ${{ secrets.GCP_SSH_PORT }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          script: |
            cd "${{ secrets.GCP_PATH }}"

            git pull --ff-only origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose --env-file .env config

            if docker ps -a --format '{{.Names}}' | grep -qx ticket-be; then
              docker stop ticket-be
              docker rm ticket-be
            fi

            docker compose --env-file .env up -d --pull always backend

            if docker compose --env-file .env ps --status running --services | grep -qx nginx; then
              docker compose --env-file .env exec -T nginx nginx -t
              docker compose --env-file .env exec -T nginx nginx -s reload
            else
              docker stop ticket-nginx || true
              docker rm ticket-nginx || true
              docker compose --env-file .env up -d --pull missing nginx
            fi
