spring:
  output:
    ansi:
      enabled: always

  application:
    name: ticket-ledger

  lifecycle:
    timeout-per-shutdown-phase: 10s

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}

server:
  port: ${PORT:8080}
  shutdown: graceful
  tomcat:
    mbeanregistry:
      # Tomcat thread pool 사용량을 Micrometer 지표로 수집한다.
      enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 300000  # 5 minutes
  refresh-token-expiration: 86400000 # 24 hours

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        # Prometheus 수집에 필요한 endpoint만 열고 env, metrics, heapdump 등은 노출하지 않는다.
        include:
          - health
          - prometheus
  endpoint:
    health:
      probes:
        # DB 상태를 포함하는 aggregate 대신 liveness를 컨테이너 헬스체크에 사용한다.
        enabled: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

toss:
  payments:
    base-url: https://api.tosspayments.com
    secret-key: ${TOSS_SECRET_KEY}
    connect-timeout: 2s
    read-timeout: 5s

app:
  time:
    # 공연 일정(LocalDateTime)을 "현재 몇 시인가"로 해석할 때 쓰는 서비스 로컬 타임존.
    # 컨테이너 타임존에 의존하지 않도록 코드에서 명시적으로 사용한다.
    # 향후 해외 공연장을 지원하면 이 단일 존 대신 venue별 타임존으로 확장한다.
    service-zone: Asia/Seoul

cache:
  event:
    list:
      ttl: 60s
    detail:
      ttl: 5m
