spring:
  output:
    ansi:
      enabled: always

  application:
    name: ticket-ledger

  datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

server:
  port: ${PORT}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: trace
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 300000 # 5 minutes
  refresh-token-expiration: 86400000 # 24 hours
