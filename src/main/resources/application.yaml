spring:
  output:
    ansi:
      enabled: always

  application:
    name: ticket-ledger

  lifecycle:
    timeout-per-shutdown-phase: 10s

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: ${PORT:8080}
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 300000  # 5 minutes
  refresh-token-expiration: 86400000 # 24 hours

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

toss:
  payments:
    base-url: https://api.tosspayments.com
    secret-key: ${TOSS_SECRET_KEY}

logging:
  pattern:
    # 모든 로그 줄에 [traceId|userId] 를 찍어 요청 단위로 장애를 추적한다(값 없으면 빈칸).
    level: "%5p [%X{traceId:-}|%X{userId:-}]"
