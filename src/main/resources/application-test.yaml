spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

logging:
  level:
    root: warn
    com.jipi.ticket_ledger: info
    org.springframework: warn
    org.hibernate: warn
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz123456}

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_secret_key}

security:
  csrf-origin:
    allowed-origins:
      - http://localhost:3000
      - https://localhost:3000
      - https://ticketledger.dev
