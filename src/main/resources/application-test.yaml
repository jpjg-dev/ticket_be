spring:
  config:
    import: optional:file:.env.test[.properties]

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

  flyway:
    enabled: true

logging:
  level:
    root: warn
    com.jipi.ticket_ledger: info
    org.springframework: warn
    org.hibernate: warn
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

server:
  port: ${PORT}

jwt:
  secret: ${JWT_SECRET}

toss:
  payments:
    base-url: http://127.0.0.1:18080
    secret-key: ${TOSS_SECRET_KEY}

reservation:
  hold-duration: 30s
  expire-scheduler:
    fixed-delay-ms: 60000
    batch-size: 100

payment:
  recovery-scheduler:
    grace-ms: 60000
    fixed-delay-ms: 60000
    batch-size: 20

security:
  csrf-origin:
    allowed-origins:
      - http://localhost:3000
      - https://localhost:3000
      - https://ticketledger.dev

cache:
  featureflag:
    queue:
      mode:
        ttl: 5s
  event:
    list:
      ttl: 60s
    detail:
      ttl: 5m

queue:
  admission:
    batch-size: 20
    fixed-delay-ms: 3000
    entry-ttl: 15m
    admission-ttl: 2m
    claim-ttl: 30s
    stream-timeout: 5m
    stream-interval: 1s
