spring:
  config:
    import: optional:file:.env.test[.properties]

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

  flyway:
    enabled: true

logging:
  level:
    root: warn
    com.jipi.ticket_ledger: info
    org.springframework: warn
    org.hibernate: warn
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:q4mzk1bpyxvcr6atn2swe5ldjhfig3uo}

toss:
  payments:
    base-url: http://127.0.0.1:18080
    secret-key: ${TOSS_SECRET_KEY:test_secret_key}

reservation:
  hold-duration: 30s
  expire-scheduler:
    fixed-delay-ms: 60000

payment:
  recovery-scheduler:
    grace-ms: 60000
    fixed-delay-ms: 60000

security:
  csrf-origin:
    allowed-origins:
      - http://localhost:3000
      - https://localhost:3000
      - https://ticketledger.dev

cache:
  event:
    list:
      ttl: 60s
      max-size: 1
    detail:
      ttl: 5m
      max-size: 100
