spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

server:
  ssl:
    enabled: true
    key-store: file:certs/localhost.p12
    key-store-password: changeit
    key-store-type: PKCS12

logging:
  level:
    root: info
    com.jipi.ticket_ledger: debug
    org.springframework: warn
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
