spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

server:
  ssl:
    enabled: true
    key-store: file:certs/localhost.p12
    key-store-password: changeit
    key-store-type: PKCS12

logging:
  level:
    root: info
    com.jipi.ticket_ledger: debug
    org.springframework: warn
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

#예약 만료 스케쥴러
reservation:
  hold-duration: 10s
  expire-scheduler:
    fixed-delay-ms: 1500000000000 # 15 seconds

security:
  csrf-origin:
    allowed-origins:
      - https://localhost:3000
      - http://localhost:3000
      - http://127.0.0.1:3000
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus

cache:
  event:
    list:
      ttl: 10s
      max-size: 1
    detail:
      ttl: 30s
      max-size: 100
